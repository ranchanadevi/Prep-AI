<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Prep AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="glass-card auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="{{ url_for('landing') }}" class="text-decoration-none fs-2 fw-bold display-font text-white">
                    <i class="fa-solid fa-graduation-cap text-primary"></i> Prep AI
                </a>
                <p class="text-muted mt-2">Sign in to access your placement workspace</p>
            </div>

            <!-- Flash Messaging local inside the card -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{% if category == 'error' %}danger{% else %}{{ category }}{% endif %} border-0 text-white py-2 px-3 mb-4 rounded-3 text-start small" style="background: rgba(220, 38, 38, 0.2) if category=='error' else rgba(22, 163, 74, 0.2);">
                            <i class="fa-solid {% if category == 'error' %}fa-circle-xmark text-danger{% else %}fa-circle-check text-success{% endif %} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 border-secondary ps-0" id="email" name="email" required placeholder="name@college.edu">
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label">Password</label>
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-primary text-decoration-none small">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0 border-secondary ps-0" id="password" name="password" required placeholder="Enter password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mt-2">Sign In</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary">
                <span class="text-muted">Don't have an account? </span>
                <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-semibold">Sign Up</a>
            </div>
        </div>
    </div>

</body>
</html>
