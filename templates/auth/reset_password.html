<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Prep AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="glass-card auth-card animate-fade-in">
            <div class="text-center mb-4">
                <a href="{{ url_for('landing') }}" class="text-decoration-none fs-2 fw-bold display-font text-white">
                    <i class="fa-solid fa-graduation-cap text-primary"></i> Prep AI
                </a>
                <p class="text-muted mt-2">Enter your new security credentials</p>
            </div>

            <!-- Flash Messaging local inside the card -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{% if category == 'error' %}danger{% else %}{{ category }}{% endif %} border-0 text-white py-2 px-3 mb-4 rounded-3 text-start small" style="background: rgba(30, 41, 59, 0.95);">
                            <i class="fa-solid {% if category == 'error' %}fa-circle-xmark text-danger{% else %}fa-circle-check text-success{% endif %} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.reset_password') }}" method="POST">
                <input type="hidden" name="token" value="{{ token }}">
                
                <div class="mb-3">
                    <label for="password" class="form-label">New Password</label>
                    <input type="password" class="form-control border-secondary" id="password" name="password" required placeholder="Min 8 characters, letters+numbers">
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control border-secondary" id="confirm_password" name="confirm_password" required placeholder="Confirm new password">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3">Save New Password</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary">
                <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-semibold">Back to Login</a>
            </div>
        </div>
    </div>

</body>
</html>
