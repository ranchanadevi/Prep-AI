<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Prep AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="glass-card auth-card animate-fade-in" style="max-width: 550px;">
            <div class="text-center mb-4">
                <a href="{{ url_for('landing') }}" class="text-decoration-none fs-2 fw-bold display-font text-white">
                    <i class="fa-solid fa-graduation-cap text-primary"></i> Prep AI
                </a>
                <p class="text-muted mt-2">Create your student workspace</p>
            </div>

            <!-- Flash Messaging local inside the card -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{% if category == 'error' %}danger{% else %}{{ category }}{% endif %} border-0 text-white py-2 px-3 mb-4 rounded-3 text-start small" style="background: rgba(220, 38, 38, 0.2) if category=='error' else rgba(22, 163, 74, 0.2);">
                            <i class="fa-solid {% if category == 'error' %}fa-circle-xmark text-danger{% else %}fa-circle-check text-success{% endif %} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" class="form-control border-secondary" id="full_name" name="full_name" required placeholder="John Doe">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control border-secondary" id="email" name="email" required placeholder="john.doe@college.edu">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control border-secondary" id="password" name="password" required placeholder="Min 8 chars, A-Z, 0-9">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control border-secondary" id="confirm_password" name="confirm_password" required placeholder="Repeat password">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="college_name" class="form-label">College / University Name</label>
                        <input type="text" class="form-control border-secondary" id="college_name" name="college_name" required placeholder="State Institute of Technology">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-7 mb-4">
                        <label for="department" class="form-label">Department / Branch</label>
                        <select class="form-select border-secondary text-white" id="department" name="department" required style="background-color: rgba(15, 23, 42, 0.95);">
                            <option value="" disabled selected>Select Department</option>
                            <option value="Computer Science & Engineering">Computer Science & Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Electronics & Communication">Electronics & Communication</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                        </select>
                    </div>
                    <div class="col-md-5 mb-4">
                        <label for="year_of_study" class="form-label">Year of Study</label>
                        <select class="form-select border-secondary text-white" id="year_of_study" name="year_of_study" required style="background-color: rgba(15, 23, 42, 0.95);">
                            <option value="" disabled selected>Select Year</option>
                            <option value="1">1st Year (Freshman)</option>
                            <option value="2">2nd Year (Sophomore)</option>
                            <option value="3">3rd Year (Junior)</option>
                            <option value="4">4th Year (Senior)</option>
                            <option value="5">5th Year</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3">Create Account</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top border-secondary">
                <span class="text-muted">Already have an account? </span>
                <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-semibold">Sign In</a>
            </div>
        </div>
    </div>

</body>
</html>
